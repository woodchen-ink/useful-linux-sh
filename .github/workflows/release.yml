name: Create Release

on:
  push:
    tags:
      - 'v*'      # 触发条件：推送以 v 开头的标签 (如 v1.1, v1.2.0)
      - '[0-9]*'  # 也支持纯数字格式的标签 (如 1.4, 1.5)

permissions:
  contents: write  # 允许创建 release 和上传文件

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史,以便读取 tag 的 annotated message

    - name: Validate scripts syntax
      run: |
        echo "🔍 检查所有脚本语法..."
        bash -n uls.sh
        bash -n scripts/*/*.sh
        echo "✅ 所有脚本语法检查通过"

    - name: Extract version from tag
      id: version
      run: |
        # 从tag中提取版本号 (兼容 v1.4 和 1.4 两种格式)
        VERSION=${GITHUB_REF#refs/tags/}
        VERSION=${VERSION#v}  # 去掉可能的 v 前缀
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 Release version: $VERSION"

    - name: Extract tag message
      id: tag_message
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        # 确保 tag 元数据可用
        git fetch --tags --force
        # 提取 annotated tag 的 message (去掉 PGP 签名等附加内容,只保留主体)
        # 对 lightweight tag 该命令会返回 commit message,作为兜底也合理
        TAG_BODY=$(git tag -l --format='%(contents:subject)%0A%0A%(contents:body)' "$TAG_NAME")
        # 若 tag message 为空,使用兜底文案
        if [ -z "$(echo "$TAG_BODY" | tr -d '[:space:]')" ]; then
          TAG_BODY="本次发布无附加说明,请查看提交记录了解变更详情。"
        fi
        # 通过多行输出语法写入 GITHUB_OUTPUT
        {
          echo "body<<TAG_BODY_EOF"
          echo "$TAG_BODY"
          echo "TAG_BODY_EOF"
        } >> "$GITHUB_OUTPUT"
        echo "📝 Tag message 已提取"

    - name: Update version in uls.sh
      run: |
        # 更新uls.sh中的版本号
        sed -i 's/SCRIPT_VERSION="[^"]*"/SCRIPT_VERSION="${{ steps.version.outputs.version }}"/' uls.sh
        sed -i 's/# 版本: [0-9.]*/# 版本: ${{ steps.version.outputs.version }}/' uls.sh
        echo "✅ 已更新uls.sh版本号为 ${{ steps.version.outputs.version }}"

    - name: Verify version update
      run: |
        echo "🔍 验证版本更新..."
        grep "SCRIPT_VERSION=" uls.sh
        grep "# 版本:" uls.sh

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: ULS v${{ steps.version.outputs.version }}
        body: |
          ## ULS (Useful Linux Scripts) v${{ steps.version.outputs.version }}

          ### ✨ 本次更新

          ${{ steps.tag_message.outputs.body }}

          ### 🚀 快速使用
          ```bash
          curl -fsSL https://i.czl.net/uls/uls.sh -o uls.sh
          chmod +x uls.sh
          sudo ./uls.sh
          ```

          ### 📥 下载文件
          - `uls.sh` - ULS主管理脚本

          完整文档请查看: https://github.com/woodchen-ink/useful-linux-sh
        draft: false
        prerelease: false

    - name: Upload ULS Script
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./uls.sh
        asset_name: uls.sh
        asset_content_type: application/x-sh

    - name: Commit version update
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add uls.sh
        git commit -m "chore: update version to ${{ steps.version.outputs.version }}" || exit 0
        git push origin HEAD:main || echo "⚠️ 推送失败，可能是权限问题"

    - name: Release Summary
      run: |
        echo "🎉 Release创建完成!"
        echo "📦 版本: v${{ steps.version.outputs.version }}"
        echo "🔗 Release URL: ${{ steps.create_release.outputs.html_url }}"
        echo "📁 下载地址: ${{ steps.create_release.outputs.upload_url }}"